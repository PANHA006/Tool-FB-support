<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Support PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- OTPAuth library for 2FA generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc, #eff6ff);
            color: #1e293b;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -4px rgba(0, 0, 0, 0.02);
        }

        .input-style {
            background: rgba(241, 245, 249, 0.5);
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .input-style:focus {
            background: white;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .copy-active {
            color: #10b981 !important;
            transform: scale(1.1);
        }

        .progress-smooth {
            transition: width 1s linear;
        }

        .copy-feedback-top {
            position: relative;
            min-height: 3.5rem;
            padding: 0.75rem 1rem;
            background: #eef2ff;
            border-bottom: 1px solid #c7d2fe;
            overflow: hidden;
            transition: min-height 0.25s ease, padding 0.25s ease;
        }

        .copy-feedback-bar {
            position: absolute;
            inset: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            z-index: 2;
            transition: inset 0.25s ease, align-items 0.25s ease;
        }

        .copy-feedback-meta {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            min-width: 0;
        }

        .copy-feedback-label {
            transition: max-width 0.25s ease, line-height 0.25s ease;
        }

        .copy-feedback-button {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .copy-feedback-check {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            top: 1rem;
            right: 1rem;
            height: 2rem;
            padding: 0 0.7rem;
            border-radius: 999px;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.18);
            color: #059669;
            box-shadow: 0 12px 24px -20px rgba(16, 185, 129, 0.65);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            opacity: 0;
            transform: scale(0.72);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.25s ease;
        }

        .copy-feedback-check svg {
            width: 0.95rem;
            height: 0.95rem;
            stroke-width: 2.25;
        }

        .copy-feedback-card.is-copied .copy-feedback-top {
            min-height: 3.5rem;
            padding: 0.75rem 1rem;
        }

        .copy-feedback-card.is-copied .copy-feedback-bar {
            inset: 0.75rem 1rem;
            align-items: center;
        }

        .copy-feedback-card.is-copied .copy-feedback-label {
            max-width: none;
            line-height: inherit;
        }

        .copy-feedback-card.is-copied .copy-feedback-timer {
            display: inline;
        }

        .copy-feedback-card.is-copied .copy-feedback-button {
            opacity: 0;
            transform: scale(0.85);
            pointer-events: none;
        }

        .copy-feedback-card.is-copied .copy-feedback-check {
            opacity: 1;
            transform: scale(1);
        }

        .logo-stage {
            position: relative;
            width: 7rem;
            height: 7rem;
            margin: 1.3rem auto 1.4rem;
            padding: 0.85rem;
            border-radius: 2rem;
            background: linear-gradient(145deg, #0f172a, #1d4ed8 62%, #22d3ee 100%);
            box-shadow: 0 22px 50px -24px rgba(37, 99, 235, 0.72);
        }

        .logo-stage::before {
            content: "";
            position: absolute;
            inset: -0.6rem;
            border-radius: 2.4rem;
            border: 1px solid rgba(99, 102, 241, 0.16);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.22), transparent 70%);
            z-index: -1;
        }

        .logo-stage::after {
            content: "";
            position: absolute;
            inset: 1rem;
            border-radius: 1.2rem;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent);
            pointer-events: none;
        }

        .logo-image {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 1.1rem;
            background: #020617;
            padding: 0.25rem;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .brand-title {
            letter-spacing: -0.05em;
        }

        .title-accent {
            background: linear-gradient(90deg, #4338ca 0%, #4f46e5 48%, #0ea5e9 100%);
            -webkit-background-clip: text;
            color: transparent;
        }

        .brand-subtitle {
            max-width: 30rem;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.75;
        }

        @media (max-width: 640px) {
            .logo-stage {
                width: 6.25rem;
                height: 6.25rem;
            }

            .copy-feedback-check svg {
                width: 0.9rem;
                height: 0.9rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center px-4">

    <div class="w-full max-w-lg">
        <!-- Header Section -->
        <div class="p-5 text-center">
            <div class="logo-stage">
                <img src="logo/logo.png" alt="Tool Support PRO logo" class="logo-image">
            </div>
            <h1 class="brand-title text-3xl sm:text-4xl font-extrabold text-slate-900">Tool Support <span class="title-accent">PRO</span></h1>
            <p class="brand-subtitle text-slate-500 font-medium mt-3">Extract profile UIDs and 2FA codes securely.</p>
        </div>

        <div class="grid gap-6">
            <!-- SECTION: UID EXTRACTOR -->
            <div class="glass-card rounded-3xl p-6 sm:p-8">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center space-x-3">
                        <div class="p-2.5 bg-indigo-50 rounded-xl text-indigo-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800">UID Extractor</h2>
                    </div>
                    <span class="px-2 py-1 bg-slate-100 text-slate-500 text-[10px] font-bold rounded uppercase">Auto-detect</span>
                </div>
                
                <div class="space-y-4">
                    <div class="relative group">
                        <input 
                            type="text" 
                            id="fbLink" 
                            placeholder="https://facebook.com/user..."
                            class="input-style w-full pl-4 pr-12 py-3.5 rounded-2xl outline-none text-sm placeholder:text-slate-400"
                        >
                        <button 
                            onclick="clearFbLink()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-rose-500 transition-colors"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <button 
                        id="uidButton"
                        onclick="getUID()"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-indigo-100 transition-all active:scale-[0.98] flex items-center justify-center space-x-2"
                    >
                        <span id="uidButtonLabel">Extract UID</span>
                    </button>
                </div>

                <!-- Result Card -->
                <div id="uidResult" class="copy-feedback-card hidden mt-6 overflow-hidden rounded-2xl border border-indigo-100 animate-in fade-in slide-in-from-top-2 duration-300">
                    <div class="copy-feedback-top">
                        <div class="copy-feedback-bar">
                            <div class="copy-feedback-meta">
                                <span class="copy-feedback-label text-[10px] font-bold text-indigo-400 uppercase tracking-widest">User Identification</span>
                            </div>
                            <button onclick="copyText('uidText', this)" class="copy-feedback-button text-indigo-600 hover:scale-110 transition-transform">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                        <div class="copy-feedback-check" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75l2 2 4-5" />
                            </svg>
                            <span>Copied</span>
                        </div>
                    </div>
                    <div class="bg-white p-4">
                        <p id="uidText" class="font-mono text-indigo-950 break-all text-base font-bold text-center">---</p>
                    </div>
                </div>
            </div>

            <!-- SECTION: 2FA AUTHENTICATOR -->
            <div class="glass-card rounded-3xl p-6 sm:p-8">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center space-x-3">
                        <div class="p-2.5 bg-indigo-50 rounded-xl text-indigo-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                            </svg>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800">2FA Generator</h2>
                    </div>
                    <span class="px-2 py-1 bg-slate-100 text-slate-500 text-[10px] font-bold rounded uppercase">Secure</span>
                </div>

                <div class="space-y-4">
                    <div class="relative group">
                        <input 
                            type="text" 
                            id="twoFactorSecret" 
                            oninput="formatSecret(this)"
                            placeholder="Enter 2FA Secret Key..."
                            class="input-style w-full pl-4 pr-12 py-3.5 rounded-2xl outline-none text-sm uppercase font-mono placeholder:text-slate-400 placeholder:font-sans transition-all"
                        >
                        <!-- Clear Input Button -->
                        <button 
                            onclick="clearSecret()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-rose-500 transition-colors"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <button 
                        onclick="start2FA()"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-indigo-100 transition-all active:scale-[0.98]"
                    >
                        Generate Code
                    </button>
                </div>

                <!-- OTP Result Area -->
                <div id="otpResult" class="copy-feedback-card hidden mt-6 animate-in fade-in slide-in-from-top-2 duration-300">
                    <div class="overflow-hidden rounded-2xl border border-indigo-100 relative">
                        <div class="copy-feedback-top">
                            <div class="copy-feedback-bar">
                                <div class="copy-feedback-meta">
                                    <span class="copy-feedback-label text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Authentication Code</span>
                                    <span id="timer" class="copy-feedback-timer text-[10px] font-bold text-indigo-600 font-mono">30s</span>
                                </div>
                                <button onclick="copyText('otpText', this)" class="copy-feedback-button text-indigo-600 hover:scale-110 transition-transform">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                    </svg>
                                </button>
                            </div>
                            <div class="copy-feedback-check" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75l2 2 4-5" />
                                </svg>
                                <span>Copied</span>
                            </div>
                        </div>
                        <div class="bg-white p-4 text-center">
                            <p id="otpText" class="font-mono text-indigo-950 text-4xl sm:text-5xl font-black tracking-tight leading-none">000000</p>
                        </div>
                        <div class="w-full h-1.5 bg-indigo-100">
                            <div id="progressBar" class="h-full bg-indigo-500 progress-smooth" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footnote -->
        <div id="privacyNote" class="mt-10 mb-5 text-center">
            <p class="text-slate-400 text-[11px] font-bold uppercase tracking-[0.2em]">Privacy First • Browser-Side Processing</p>
        </div>

        <!-- Premium Toast Notification -->
        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center space-x-2 bg-slate-900 text-white px-5 py-3 rounded-2xl text-sm font-semibold shadow-2xl opacity-0 transition-all translate-y-4 pointer-events-none z-50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
            <span>Copied to clipboard</span>
        </div>
    </div>

    <script>
        let otpInterval;
        let uidLookupToken = 0;
        const copyFeedbackTimers = new WeakMap();
        // Browser-only pages cannot read facebook.com redirect targets, so share links
        // use a CORS-enabled relay to expose the final page HTML for UID extraction.
        const SHARE_RESOLVER_PROXY = 'https://api.codetabs.com/v1/proxy/?quest=';

        document.addEventListener('DOMContentLoaded', () => {
            const privacyNote = document.querySelector('#privacyNote p');
            if (privacyNote) {
                privacyNote.textContent = 'Direct Links Stay Local • Share Links Use Resolver';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const privacyNote = document.querySelector('#privacyNote p');
            if (privacyNote) {
                privacyNote.textContent = 'Direct Links Stay Local | Share Links Use Resolver';
            }
        });

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2000);
        }

        function formatSecret(input) {
            // Keep spaces visible in the input, but only allow Base32 chars.
            input.value = input.value
                .replace(/[^a-zA-Z2-7\s]/g, '')
                .replace(/\s+/g, ' ')
                .toUpperCase();
        }

        function getCleanSecret() {
            return document.getElementById('twoFactorSecret').value.replace(/\s+/g, '').trim();
        }

        function resetUidButtonState() {
            const button = document.getElementById('uidButton');
            const buttonLabel = document.getElementById('uidButtonLabel');
            if (!button || !buttonLabel) return;

            button.disabled = false;
            button.classList.remove('opacity-70', 'cursor-wait');
            buttonLabel.innerText = 'Extract UID';
        }

        function clearFbLink() {
            const input = document.getElementById('fbLink');
            uidLookupToken++;
            input.value = '';
            input.focus();
            resetCopyFeedback('uidResult');
            document.getElementById('uidResult').classList.add('hidden');
            resetUidButtonState();
        }

        function clearSecret() {
            const input = document.getElementById('twoFactorSecret');
            input.value = '';
            input.focus();
            resetCopyFeedback('otpResult');
            document.getElementById('otpResult').classList.add('hidden');
            clearInterval(otpInterval);
        }

        function setFallbackCopyText(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }

        function resetCopyFeedback(resultId) {
            const resultCard = document.getElementById(resultId);
            if (!resultCard) return;

            const activeTimer = copyFeedbackTimers.get(resultCard);
            if (activeTimer) {
                clearTimeout(activeTimer);
                copyFeedbackTimers.delete(resultCard);
            }

            resultCard.classList.remove('is-copied');
        }

        function showCopyFeedback(btnElement) {
            const resultCard = btnElement?.closest('.copy-feedback-card');
            if (!resultCard) return;

            const activeTimer = copyFeedbackTimers.get(resultCard);
            if (activeTimer) clearTimeout(activeTimer);

            resultCard.classList.add('is-copied');

            const timer = setTimeout(() => {
                resultCard.classList.remove('is-copied');
                copyFeedbackTimers.delete(resultCard);
            }, 1600);

            copyFeedbackTimers.set(resultCard, timer);
        }

        async function copyText(id, btnElement) {
            const text = document.getElementById(id).innerText;

            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    setFallbackCopyText(text);
                }

                showCopyFeedback(btnElement);
                showToast();
            } catch (error) {
                setFallbackCopyText(text);
                showCopyFeedback(btnElement);
                showToast();
            }
        }

        function extractUidFromText(text) {
            if (!text) return null;

            const patterns = [
                /[?&]id=(\d+)/,
                /fb:\/\/profile\/(\d+)/,
                /profile\.php\?id=(\d+)/,
                /pb\.(\d+)\./,
                /entity_id["':\s]+(\d+)/i,
                /\b(\d{10,})\b/
            ];

            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match) return match[1];
            }

            return null;
        }

        async function resolveShareUid(url) {
            const response = await fetch(`${SHARE_RESOLVER_PROXY}${encodeURIComponent(url)}`);
            if (!response.ok) {
                throw new Error(`Resolver request failed with status ${response.status}`);
            }

            const html = await response.text();
            return extractUidFromText(html);
        }

        async function getUID() {
            const url = document.getElementById('fbLink').value.trim();
            const resultArea = document.getElementById('uidResult');
            const displayText = document.getElementById('uidText');
            const button = document.getElementById('uidButton');
            const buttonLabel = document.getElementById('uidButtonLabel');
            const requestToken = ++uidLookupToken;

            if (!url) return;
            resetCopyFeedback('uidResult');
            resultArea.classList.remove('hidden');

            const shareMatch = url.match(/facebook\.com\/share\/[a-zA-Z0-9]+/i);
            const uid = extractUidFromText(url);

            if (uid) {
                displayText.innerText = uid;
                displayText.className = "font-mono text-indigo-950 break-all text-base font-bold text-center";
                return;
            }

            if (!shareMatch) {
                displayText.innerText = "Could not find UID automatically";
                displayText.className = "font-sans text-red-500 text-xs font-semibold text-center";
                return;
            }

            displayText.innerText = "Resolving share link...";
            displayText.className = "font-sans text-indigo-500 text-xs font-semibold text-center";
            button.disabled = true;
            button.classList.add('opacity-70', 'cursor-wait');
            buttonLabel.innerText = "Resolving...";

            try {
                const shareUid = await resolveShareUid(url);
                if (requestToken !== uidLookupToken) return;

                if (shareUid) {
                    displayText.innerText = shareUid;
                    displayText.className = "font-mono text-indigo-950 break-all text-base font-bold text-center";
                } else {
                    displayText.innerText = "Share link found, but UID was not exposed";
                    displayText.className = "font-sans text-amber-600 text-xs font-semibold text-center";
                }
            } catch (error) {
                if (requestToken !== uidLookupToken) return;
                displayText.innerText = "Could not resolve share link right now";
                displayText.className = "font-sans text-red-500 text-xs font-semibold text-center";
            } finally {
                if (requestToken === uidLookupToken) {
                    resetUidButtonState();
                }
            }
        }

        function start2FA() {
            const secret = getCleanSecret();
            const resultArea = document.getElementById('otpResult');
            if (!secret) return;
            resetCopyFeedback('otpResult');
            resultArea.classList.remove('hidden');
            clearInterval(otpInterval);
            updateOTP();
            otpInterval = setInterval(updateOTP, 1000);
        }

        function updateOTP() {
            const secret = getCleanSecret();
            const otpText = document.getElementById('otpText');
            const timer = document.getElementById('timer');
            const bar = document.getElementById('progressBar');

            try {
                const totp = new OTPAuth.TOTP({
                    secret: OTPAuth.Secret.fromBase32(secret),
                    digits: 6,
                    period: 30
                });

                const code = totp.generate();
                otpText.innerText = code;

                const seconds = Math.floor(Date.now() / 1000) % 30;
                const remaining = 30 - seconds;
                timer.innerText = remaining + 's';
                bar.style.width = (remaining / 30 * 100) + '%';
                
                if (remaining <= 5) {
                    timer.classList.replace('text-indigo-600', 'text-rose-500');
                    bar.classList.replace('bg-indigo-500', 'bg-rose-500');
                } else {
                    timer.classList.replace('text-rose-500', 'text-indigo-600');
                    bar.classList.replace('bg-rose-500', 'bg-indigo-500');
                }

            } catch (e) {
                otpText.innerText = "INVALID KEY";
                otpText.className = "text-xl font-bold text-rose-500 font-mono tracking-normal leading-none p-4";
                clearInterval(otpInterval);
            }
        }
    </script>
</body>
</html>
